<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HDFERRO12008DUB-BAIXO</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: #c4b5fd;
      text-align: center;
      max-width: 860px;
      word-break: break-all;
    }
    .player-wrap {
      width: 100%;
      max-width: 900px;
      background: #1a1d27;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    video {
      width: 100%;
      display: block;
      background: #000;
      aspect-ratio: 16 / 9;
    }
    #status {
      padding: 12px 16px;
      font-size: 0.85rem;
      text-align: center;
      background: #232838;
      border-top: 1px solid #2e354a;
    }
    #status.loading { color: #fbbf24; }
    #status.ok { color: #34d399; }
    #status.error { color: #f87171; }
  </style>
</head>
<body>

  <h1>Reprodutor HLS — Homem de Ferro</h1>

  <div class="player-wrap">
    <video id="video" controls autoplay playsinline></video>
    <div id="status" class="loading">A carregar lista de reprodução local...</div>
  </div>

  <script>
    class RawBinaryLoader extends Hls.DefaultConfig.loader {
      constructor(config) {
        super(config);
        const originalLoad = this.load.bind(this);
        this.load = function (context, config, callbacks) {
          context.responseType = 'arraybuffer';
          originalLoad(context, config, callbacks);
        };
      }
    }

    const video = document.getElementById('video');
    const status = document.getElementById('status');

    function parseM3U(text) {
      const lines = text.split('\n');
      for (let line of lines) {
        line = line.trim();
        if (line && !line.startsWith('#')) {
          return line;
        }
      }
      return null;
    }

    fetch('./playlist.m3u')
      .then(response => {
        if (!response.ok) {
          throw new Error('Não foi possível carregar o ficheiro playlist.m3u.');
        }
        return response.text();
      })
      .then(m3uContent => {
        const videoUrl = parseM3U(m3uContent);

        if (!videoUrl) {
          status.className = 'error';
          status.textContent = 'Erro: Nenhuma URL de vídeo encontrada dentro do playlist.m3u.';
          return;
        }

        if (Hls.isSupported()) {
          const hls = new Hls({
            enableWorker: false,
            lowLatencyMode: false,
            fLoader: RawBinaryLoader
          });
          hls.loadSource(videoUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            status.className = 'ok';
            status.textContent = 'Playlist carregada com sucesso — a reproduzir...';
            video.play().catch(() => {});
          });
          hls.on(Hls.Events.ERROR, (_, data) => {
            console.warn('HLS error:', data.details);
            if (data.fatal) {
              status.className = 'error';
              status.textContent = 'Erro de rede ou CORS ao tentar aceder aos fragmentos de vídeo.';
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = videoUrl;
          video.addEventListener('loadedmetadata', () => {
            status.className = 'ok';
            status.textContent = 'A reproduzir (Player Nativo)...';
            video.play().catch(() => {});
          });
          video.addEventListener('error', () => {
            status.className = 'error';
            status.textContent = 'Erro no player nativo.';
          });
        } else {
          status.className = 'error';
          status.textContent = 'O teu navegador não suporta a tecnologia de streaming deste player.';
        }
      })
      .catch(err => {
        status.className = 'error';
        status.textContent = err.message;
        console.error(err);
      });
  </script>
</body>
</html>
